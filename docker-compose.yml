services:
    app:
        build: .
        container_name: loan_api_app
        ports:
            - "8080:8000"
        environment:
            DATABASE_URL: "postgresql://user:password@db:5432/loan_db?serverVersion=15&charset=utf8"
        depends_on:
            - db
        volumes:
            - .:/var/www/html
        networks:
            - app-network

    db:
        image: postgres:15-alpine
        container_name: loan_api_db
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: loan_db
        ports:
            - "5434:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - app-network

    redis:
        image: redis:7.4-alpine
        ports:
            - "6379:6379"
        networks:
            - app-network
volumes:
    db_data:

networks:
    app-network:
     driver: bridge
